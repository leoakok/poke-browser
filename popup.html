<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>poke-browser</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
      }
      body {
        margin: 0;
        padding: 12px;
        width: 320px;
        max-height: 420px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      label {
        min-width: 72px;
        color: color-mix(in srgb, CanvasText 75%, transparent);
      }
      input[type="number"],
      input[type="password"],
      input[type="text"]#token {
        padding: 4px 6px;
      }
      input[type="number"] {
        width: 88px;
      }
      input#token {
        flex: 1;
        min-width: 0;
      }
      button {
        padding: 4px 10px;
        cursor: pointer;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 500;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #888;
      }
      .dot.connected {
        background: #2ecc71;
      }
      .dot.connecting {
        background: #f1c40f;
      }
      .dot.disconnected {
        background: #e74c3c;
      }
      #log {
        border: 1px solid color-mix(in srgb, CanvasText 18%, Canvas);
        border-radius: 6px;
        padding: 8px;
        flex: 1;
        min-height: 160px;
        max-height: 220px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .hint {
        font-size: 11px;
        color: color-mix(in srgb, CanvasText 65%, transparent);
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>poke-browser</h1>
    <div class="row">
      <span class="status" id="statusRow">
        <span class="dot disconnected" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </span>
    </div>
    <div class="row">
      <label for="port">WS port</label>
      <input id="port" type="number" min="1" max="65535" />
      <button type="button" id="applyPort">Apply</button>
      <button type="button" id="reconnect">Reconnect</button>
    </div>
    <div class="row">
      <label for="token">Auth token</label>
      <input id="token" type="password" autocomplete="off" placeholder="Paste token from MCP stderr" />
      <button type="button" id="applyToken">Save</button>
    </div>
    <div class="hint">
      MCP server listens on this port and prints a WebSocket auth token to stderr. Paste it here (must match
      <code>POKE_BROWSER_TOKEN</code> if you set that env var).
    </div>
    <div style="font-weight: 600">Recent activity</div>
    <div id="log"></div>
    <script src="popup.js"></script>
  </body>
</html>
