<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>poke-browser</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #111;
        --border: #222;
        --text-primary: #fafafa;
        --text-muted: #888;
        --accent: #7c3aed;
        --accent-muted: rgba(124, 58, 237, 0.35);
        --error: #ef4444;
        --connected: #22c55e;
        --footer-mid: #555;
        --footer-low: #444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 14px;
        width: 320px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .wordmark {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.02em;
      }

      .gh-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        color: var(--text-muted);
        transition: color 0.15s ease, background 0.15s ease;
      }

      .gh-link:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.06);
      }

      .gh-link svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 12px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--error);
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.25);
      }

      .dot.connected {
        background: var(--connected);
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
      }

      .dot.connecting {
        background: #eab308;
        box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.3);
      }

      #statusText {
        font-weight: 500;
        font-size: 13px;
        color: var(--text-primary);
      }

      .port-url {
        font-size: 12px;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
        word-break: break-all;
      }

      .url-edit-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        max-width: 100%;
      }

      #url-display {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        color: var(--text-muted);
        word-break: break-all;
        flex: 1;
        min-width: 0;
      }

      #url-input {
        flex: 1;
        min-width: 0;
        padding: 4px 8px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        color: var(--text-primary);
        outline: none;
      }

      #url-input:focus {
        border-color: var(--accent-muted);
      }

      .url-icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 2px;
        border: none;
        border-radius: 4px;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        transition: color 0.15s ease, background 0.15s ease;
      }

      .url-icon-btn:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.06);
      }

      .hidden {
        display: none !important;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 14px;
      }

      .toggle-label {
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 500;
      }

      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #3f3f46;
        border-radius: 6px;
        transition: background 0.2s ease;
      }

      .slider::before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background: #fafafa;
        border-radius: 4px;
        transition: transform 0.2s ease;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      }

      .switch input:checked + .slider {
        background: var(--accent);
      }

      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }

      .switch input:focus-visible + .slider {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .logs-section {
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 14px;
        overflow: hidden;
        background: var(--surface);
      }

      .logs-header {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        margin: 0;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        text-align: left;
      }

      .logs-header:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .logs-chevron {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        transition: transform 0.2s ease;
        flex-shrink: 0;
      }

      .logs-section.expanded .logs-chevron {
        transform: rotate(180deg);
      }

      .logs-collapse {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
      }

      .logs-section.expanded .logs-collapse {
        max-height: 200px;
        overflow-y: auto;
      }

      #log-list {
        padding: 0 14px 10px;
      }

      #log-list .log-line {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        color: #666;
        border-bottom: 1px solid #1a1a1a;
        padding: 6px 0;
        word-break: break-word;
      }

      #log-list .log-line:last-child {
        border-bottom: none;
      }

      .footer {
        text-align: center;
        padding-top: 4px;
      }

      .version {
        font-size: 11px;
        color: var(--footer-mid);
        margin-bottom: 4px;
      }

      .credit {
        font-size: 10px;
        color: var(--footer-low);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <span class="wordmark">poke-browser</span>
      <a
        class="gh-link"
        href="https://github.com/leoakok/poke-browser"
        target="_blank"
        rel="noopener noreferrer"
        title="GitHub"
        aria-label="poke-browser on GitHub"
      >
        <svg viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"
          />
        </svg>
      </a>
    </header>

    <section class="card" aria-live="polite">
      <div class="status-row">
        <span class="dot disconnected" id="statusDot" aria-hidden="true"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div id="disconnected-hint" class="hidden">
        <p style="font-size:11px;color:#888;margin:8px 0 4px;">Start the MCP server:</p>
        <code style="font-size:10px;background:#1a1a1a;border:1px solid #222;border-radius:4px;padding:4px 8px;display:block;color:#a78bfa;font-family:monospace;user-select:all;">npx poke-browser@latest</code>
      </div>
      <div class="url-edit-row" id="urlEditRow">
        <span id="url-display"></span>
        <button type="button" id="url-edit-btn" class="url-icon-btn" aria-label="Edit WebSocket URL" title="Edit URL">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <input type="text" id="url-input" class="hidden" spellcheck="false" autocomplete="off" aria-label="WebSocket URL" />
        <button type="button" id="url-ok-btn" class="url-icon-btn hidden" aria-label="Save URL" title="Save">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <polyline points="20 6 9 17 4 12" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <button type="button" id="url-cancel-btn" class="url-icon-btn hidden" aria-label="Cancel editing" title="Cancel">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
            <line x1="6" y1="6" x2="18" y2="18" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </section>

    <div class="toggle-row">
      <span class="toggle-label" id="toggleLabel">MCP Connection</span>
      <label class="switch" title="Enable MCP WebSocket bridge">
        <input type="checkbox" id="mcpEnabled" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="logs-section" id="logsSection">
      <button type="button" class="logs-header" id="logsToggle" aria-expanded="false" aria-controls="logsCollapse">
        <span>Logs</span>
        <span class="logs-chevron" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </button>
      <div class="logs-collapse" id="logsCollapse">
        <div id="log-list"></div>
      </div>
    </div>

    <div id="update-notice" style="display:none;font-size:10px;color:#f59e0b;background:#1c1500;border:1px solid #3d2e00;border-radius:4px;padding:4px 8px;margin-top:6px;text-align:center;cursor:pointer;" onclick="window.open('https://www.npmjs.com/package/poke-browser')"></div>

    <footer class="footer">
      <div class="version" id="version"></div>
      <div class="credit">Built by Poke x Leo</div>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
