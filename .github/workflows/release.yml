name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Bump patch version
        working-directory: mcp-server
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          node -e "const fs=require('fs');const v='${NEW_VERSION}';const m=JSON.parse(fs.readFileSync('../extension/manifest.json'));m.version=v.replace(/^v/,'');fs.writeFileSync('../extension/manifest.json',JSON.stringify(m,null,2)+'\n');"

      - name: Commit and push version bump
        run: |
          git add mcp-server/package.json extension/manifest.json
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
          git push origin main

      - name: Publish to npm
        working-directory: mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMTOKEN }}
        run: npm publish --access public

      - name: Create Git tag
        run: |
          git tag v${{ env.NEW_VERSION }}
          git push origin v${{ env.NEW_VERSION }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ env.NEW_VERSION }}`,
              name: `v${{ env.NEW_VERSION }}`,
              body: `## @leokok/poke-browser v${{ env.NEW_VERSION }}\n\n### Install\n\`\`\`\nnpx @leokok/poke-browser\n\`\`\`\n\n### Changes\nAuto-released via CI. See commit history for details.\n\n### Links\n- [npm](https://www.npmjs.com/package/@leokok/poke-browser)\n- [GitHub](https://github.com/leoakok/poke-browser)`,
              draft: false,
              prerelease: false
            });
