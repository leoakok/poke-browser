# CI on every PR and every branch push.
# CD (patch bump + npm publish @leokok/poke-browser) only on push to main after CI passes.
# Aligned with leoakok/poke-agents ci-release.yml pattern.
#
# Secrets required:
#   NPM_TOKEN — npm publish token for @leokok/poke-browser

name: CI and Release

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

  release:
    name: Release
    needs: verify
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !github.event.repository.fork &&
      !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Bump patch version
        working-directory: mcp-server
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          node -e "const fs=require('fs');const m=JSON.parse(fs.readFileSync('../extension/manifest.json'));m.version='$NEW_VERSION'.replace(/^v/,'');fs.writeFileSync('../extension/manifest.json',JSON.stringify(m,null,2)+'\n');"

      - name: Commit and push version bump
        run: |
          git add mcp-server/package.json extension/manifest.json
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
          git push origin main

      - name: Publish to npm
        working-directory: mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create Git tag
        run: |
          git tag v${{ env.NEW_VERSION }}
          git push origin v${{ env.NEW_VERSION }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ env.NEW_VERSION }}`,
              name: `v${{ env.NEW_VERSION }}`,
              body: `## @leokok/poke-browser v${{ env.NEW_VERSION }}\n\n### Install\n\`\`\`\nnpx @leokok/poke-browser\n\`\`\`\n\n### Links\n- [npm](https://www.npmjs.com/package/@leokok/poke-browser)\n- [GitHub](https://github.com/leoakok/poke-browser)`,
              draft: false,
              prerelease: false
            });
